<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="13" fill="#f6f1e6"/>
  <!-- a horizon: contour ridges with a sun rising over the next one -->
  <clipPath id="c"><rect x="8" y="8" width="48" height="48" rx="8"/></clipPath>
  <g clip-path="url(#c)">
    <!-- rising sun (the next thing) -->
    <circle cx="32" cy="34" r="11" fill="#eab14f"/>
    <circle cx="32" cy="34" r="11" fill="none" stroke="#c9842b" stroke-width="1.2"/>
    <!-- the near ridge, occluding the lower sun -->
    <path d="M8 44 C 18 38, 26 46, 32 44 C 40 41, 48 49, 56 43 L56 56 L8 56 Z" fill="#13564f"/>
    <!-- a far contour line -->
    <path d="M8 30 C 16 26, 24 31, 32 28 C 41 25, 49 31, 56 27" fill="none" stroke="#2c857a" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
